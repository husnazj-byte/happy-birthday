<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surat Khas Untuk Huda 💌</title>
    <style>
        /* --- Google Fonts --- */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Fredoka+One&display=swap');

        /* --- Global Styles --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            overflow: hidden; 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* --- BACKGROUND BIRU MUDA COMEL DENGAN CORAK PARTI (CSS TULEN) --- */
            background-color: #e0f2fe; 
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.6) 10%, transparent 10.5%),
                radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.6) 8%, transparent 8.5%),
                linear-gradient(45deg, transparent 45%, rgba(255, 182, 193, 0.3) 48%, rgba(255, 182, 193, 0.3) 52%, transparent 55%);
            background-size: 100% 100%, 100% 100%, 60px 60px;
        }

        .scene {
            position: relative;
            display: flex;
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        /* --- TEKS OPEN ME DI ATAS SAMPUL SURAT --- */
        .open-me-text {
            font-family: 'Fredoka One', cursive;
            color: #ff0055; 
            font-size: 2.8rem; 
            letter-spacing: 2px;
            text-shadow: 3px 3px 0px #fff;
            margin-bottom: 30px; 
            z-index: 15;
            animation: textBounce 2s ease-in-out infinite alternate;
            text-align: center;
            pointer-events: none;
        }

        /* --- CONTAINER UTAMA SAMPUL BESAR --- */
        .envelope-container {
            position: relative;
            width: 450px; 
            height: 280px;
            cursor: pointer;
            animation: floatAround 4s ease-in-out infinite alternate;
            z-index: 10;
            transition: transform 0.3s ease;
        }

        /* Badan sampul surat (Warna Cream) */
        .envelope {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #fdfbd4; 
            border-radius: 0 0 20px 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            border: 5px solid #fff;
            overflow: visible;
        }

        /* Penutup Atas Sampul Surat (Warna Hot Pink) */
        .envelope-flap {
            position: absolute;
            top: 0;
            left: -5px; 
            width: 0;
            height: 0;
            border-left: 225px solid transparent;
            border-right: 225px solid transparent;
            border-top: 150px solid #ff0055; 
            border-radius: 20px 20px 0 0;
            transform-origin: top;
            transition: transform 0.6s ease;
            z-index: 4;
        }

        /* Lapisan poket depan sampul */
        .envelope-front {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(200deg, #ff007f 50%, #ff5c8a 50%); 
            border-radius: 0 0 15px 15px;
            z-index: 2;
        }

        /* --- COP BULAT MUKA HUDA2 DI TENGAH SAMPUL --- */
        .profile-seal {
            position: absolute;
            top: 110px; 
            left: 50%;
            transform: translateX(-50%);
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: 4px solid #fff;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            object-fit: cover;
            z-index: 5; 
            transition: all 0.4s ease;
            pointer-events: none;
        }

        /* --- EFFECT BILA KLIK (TERBUKA) --- */
        .envelope-container.open {
            animation: none; 
            transform: scale(1.05);
        }

        .envelope-container.open .envelope-flap {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .envelope-container.open .profile-seal {
            opacity: 0;
            transform: translateX(-50%) scale(0);
        }

        /* --- CORAK HIASAN EMOJI DI KELILING --- */
        .doodle {
            position: absolute;
            pointer-events: none;
            animation: spinAndFloat 5s linear infinite;
            opacity: 0.9;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.08));
        }

        .d1 { top: 12%; left: 12%; font-size: 3.5rem; animation-delay: 0s; }
        .d2 { top: 15%; right: 12%; font-size: 4rem; animation-delay: 1s; }
        .d3 { bottom: 15%; left: 10%; font-size: 3.8rem; animation-delay: 2s; }
        .d4 { bottom: 12%; right: 12%; font-size: 3.5rem; animation-delay: 3s; }
        .d5 { top: 45%; left: 8%; font-size: 2.8rem; animation-delay: 1.5s; }
        .d6 { top: 40%; right: 8%; font-size: 3.2rem; animation-delay: 2.5s; }

        /* --- KEYFRAMES ANIMASI --- */
        @keyframes floatAround {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-25px) rotate(1.5deg); } 
            100% { transform: translateY(15px) rotate(-1.5deg); }
        }

        @keyframes spinAndFloat {
            0% { transform: translateY(0) rotate(0deg) scale(1); }
            50% { transform: translateY(-20px) rotate(180deg) scale(1.1); }
            100% { transform: translateY(0) rotate(360deg) scale(1); }
        }

        @keyframes textBounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-10px); }
        }

        /* ========================================================
           KOD AUTO-RESPONSIVE: KHAS UNTUK PAPARAN TELEFON / IPAD
           ======================================================== */
        @media (max-width: 500px) {
            .open-me-text {
                font-size: 2.2rem; /* Kecilkan teks tajuk kat phone */
                margin-bottom: 15px;
            }
            .envelope-container {
                width: 320px; /* Saiz sampul surat mengecil ngam ikut screen phone */
                height: 200px;
            }
            .envelope-flap {
                border-left: 160px solid transparent;
                border-right: 160px solid transparent;
                border-top: 110px solid #ff0055;
                left: -4px;
            }
            .profile-seal {
                top: 75px; /* Alihkan kedudukan muka Huda bagi center balik kat phone */
                width: 60px;
                height: 60px;
                border: 3px solid #fff;
            }
            .doodle {
                font-size: 2.2rem !important; /* Kecilkan semua emoji hiasan */
            }
        }
    </style>
</head>
<body>

    <div class="doodle d1">🌈</div>
    <div class="doodle d2">🌸</div>
    <div class="doodle d3">🌟</div>
    <div class="doodle d4">🎈</div>
    <div class="doodle d5">🧸</div>
    <div class="doodle d6">🎂</div>

    <div class="scene">
        <div class="open-me-text" id="openText">OPEN ME ✨</div>

        <div class="envelope-container" id="sampul" onclick="bukaSampulInteraktif()">
            <div class="envelope-flap"></div>
            
            <img src="HUDA2.jpeg" alt="Huda Seal" class="profile-seal">
            
            <div class="envelope">
                <div class="envelope-front"></div>
            </div>
        </div>
    </div>

    <script>
        function bukaSampulInteraktif() {
            let sampul = document.getElementById('sampul');
            let openText = document.getElementById('openText');
            
            sampul.classList.add('open');
            openText.style.opacity = '0'; 
            openText.style.transition = 'opacity 0.3s ease';
            
            setTimeout(() => {
                window.location.href = 'letter.html';
            }, 1000); 
        }
    </script>

</body>
</html>
